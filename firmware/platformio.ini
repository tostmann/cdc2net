; CDC2NET firmware — ser2net-style USB-Host-CDC -> network bridge on
; ESP32-S3 (YD-ESP32-S3 V1.4 / 16 MB).  Generalisation of RFNETHM.
;
; Bringup board: YD-ESP32-S3.  Two USB ports:
;   - USB1 (CH343P)  = programming + UART0 console  -> flash/monitor here
;   - USB2 (native)  = USB-OTG PHY, reserved for HOST mode (the stick)
; Auto-reset/-bootload via DTR/RTS on USB1 is the same path as RFNETHM.

[platformio]
; Build output on local ext4, NOT on the NFS-mounted /Public.  NFS close()
; flushes only to the client cache; ranlib/esptool reading an archive or
; image before write-back has bitten RFNETHM ("file format not recognized",
; NUL-prefixed version.h).  Keep artifacts off NFS.
build_dir = /root/pio-build/cdc2net-build

[env:cdc2net]
; espressif32@6.13.0 == IDF 5.5.x.  Pinned because several platform versions
; are cached locally and the default differs between machines.  This is also
; the IDF on which RFNETHM runs USB-host + WiFi together (the #15079
; coexistence counter-evidence) — keep aligned until M1 re-validates
; enumeration-under-WiFi for true CDC-ACM / ESP-JTAG devices.
platform   = espressif32@6.13.0
board      = esp32-s3-devkitc-1
framework  = espidf

monitor_speed = 115200

; --- Flash/upload port (USB1 / CH343P) --------------------------------
; Fill in THIS board's stable by-id path before flashing, e.g.:
;   upload_port  = /dev/serial/by-id/usb-1a86_USB_Single_Serial_XXXXXXXX-if00
;   monitor_port = /dev/serial/by-id/usb-1a86_USB_Single_Serial_XXXXXXXX-if00
; Left unset on purpose so a wrong device path isn't baked in.
upload_speed = 921600

board_build.flash_size  = 16MB
board_upload.flash_size = 16MB
board_build.partitions  = partitions_ota.csv

; Pre-build hook: snapshot working tree to git (repo root = /Public/CLAUDE/
; CDC2NET), bump build_number.txt, regenerate src/version.h.
extra_scripts = pre:scripts/version_bump.py

; YD-ESP32-S3 V1.4 has no active VBUS switch -> passive 5V tie, VBUS_GPIO=-1
; (consumed from M1 on in the USB-host source).  Boards with a TPS2065/
; SY6280-style switch set the GPIO + active polarity here.
;build_flags =
;    -D VBUS_GPIO=12
;    -D VBUS_ACTIVE_HIGH=1
